<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#mbGrad)"/>
  <!-- Glow overlay -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#glowGrad)"/>
  
  <!-- MB Text -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">MB</text>
</svg>